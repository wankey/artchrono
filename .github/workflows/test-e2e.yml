name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Provide placeholder Supabase env for smoke tests
        run: |
          echo "VITE_SUPABASE_URL=https://e2e-placeholder.supabase.co" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=e2e-placeholder-anon-key" >> "$GITHUB_ENV"
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run E2E tests
        run: pnpm test:e2e
