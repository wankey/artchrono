<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Clock face with brush stroke tick -->
  <g transform="translate(30,30)">
    <!-- Outer ring -->
    <circle r="25" stroke="#5BB5A2" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Inner ring -->
    <circle r="21" stroke="#5BB5A2" stroke-width="0.5" fill="none" opacity="0.2"/>

    <!-- 12 tick marks -->
    <!-- 12:00 --><line x1="0" y1="-19.5" x2="0" y2="-23" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 1:00 --><line x1="9.75" y1="-16.9" x2="11.5" y2="-19.9" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 2:00 → brush stroke (extended) -->
    <line x1="16.9" y1="-9.75" x2="19.9" y2="-11.5" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19.9,-11.5 Q27,-17 32,-14" stroke="#5BB5A2" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M32,-14 Q35,-12.5 34,-10 Q33,-8 30,-9" fill="#5BB5A2" opacity="0.6"/>

    <!-- 3:00 --><line x1="19.5" y1="0" x2="23" y2="0" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 4:00 --><line x1="16.9" y1="9.75" x2="19.9" y2="11.5" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 5:00 --><line x1="9.75" y1="16.9" x2="11.5" y2="19.9" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 6:00 --><line x1="0" y1="19.5" x2="0" y2="23" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 7:00 --><line x1="-9.75" y1="16.9" x2="-11.5" y2="19.9" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 8:00 --><line x1="-16.9" y1="9.75" x2="-19.9" y2="11.5" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 9:00 --><line x1="-19.5" y1="0" x2="-23" y2="0" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 10:00 --><line x1="-16.9" y1="-9.75" x2="-19.9" y2="-11.5" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 11:00 --><line x1="-9.75" y1="-16.9" x2="-11.5" y2="-19.9" stroke="#5BB5A2" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle r="1.5" fill="#1A3C38"/>
  </g>

  <!-- Wordmark -->
  <text x="70" y="28" font-family="'PingFang SC','Noto Serif SC',serif" font-size="20" font-weight="700" fill="#1A3C38">艺时纪</text>
  <text x="70" y="44" font-family="'Inter','SF Pro',sans-serif" font-size="11" font-weight="500" fill="#5BB5A2" letter-spacing="2">ArtChrono</text>
</svg>
